# Development override — applied automatically by `docker compose up`.
# Replaces the built web image with a hot-reloading dev container that mounts
# the source. Postgres, Redis, Mailhog and Adminer come from docker-compose.yml.
services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"

volumes:
  node_modules:
  next_cache:
