<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="68" text-anchor="middle" class="t h">Angle Chase Visual Proof</text>
<text x="350" y="108" text-anchor="middle" class="t s">Interior angles combine to form a straight angle</text>
<line x1="70" y1="170" x2="630" y2="170" stroke="#111827" stroke-width="4"/>
<line x1="120" y1="670" x2="580" y2="670" stroke="#111827" stroke-width="4"/>
<line x1="230" y1="670" x2="350" y2="170" stroke="#111827" stroke-width="4"/>
<line x1="510" y1="670" x2="350" y2="170" stroke="#111827" stroke-width="4"/>
<path d="M160 170 A120 120 0 0 1 300 250 L350 170 Z" fill="#f97316" opacity="0.85"/>
<path d="M305 250 A130 130 0 0 1 470 260 L350 170 Z" fill="#38bdf8" opacity="0.85"/>
<path d="M470 260 A120 120 0 0 1 545 170 L350 170 Z" fill="#84cc16" opacity="0.85"/>
<path d="M120 670 A65 65 0 0 1 180 610 L230 670 Z" fill="#f97316" opacity="0.85"/>
<path d="M510 670 A70 70 0 0 1 450 620 L510 670 Z" fill="#84cc16" opacity="0.85"/>
<text x="350" y="760" text-anchor="middle" class="t m">Matching colours show equal angles. The three angles around the top lie on a straight line, so they add to 180°.</text>

    </svg>