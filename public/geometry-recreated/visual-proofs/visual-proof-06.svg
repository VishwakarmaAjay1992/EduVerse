<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="68" text-anchor="middle" class="t h">Pythagorean Theorem by Rearrangement</text>
<text x="350" y="108" text-anchor="middle" class="t s">c² = a² + b²</text>
<g transform="translate(70,170)">
  <rect x="0" y="0" width="250" height="250" fill="#fff" stroke="#111827" stroke-width="3"/>
  <polygon points="0,0 95,0 0,95" fill="#96cdfc" stroke="#111827"/>
  <polygon points="250,0 155,0 250,95" fill="#aee071" stroke="#111827"/>
  <polygon points="250,250 155,250 250,155" fill="#6bd16d" stroke="#111827"/>
  <polygon points="0,250 95,250 0,155" fill="#4ba3f1" stroke="#111827"/>
  <polygon points="47,70 180,47 203,180 70,203" fill="#fff" stroke="#111827" stroke-width="3"/>
  <text x="120" y="140" class="t h">c²</text>
  <text x="30" y="40" class="t sm">a</text><text x="73" y="18" class="t sm">b</text>
</g>
<g transform="translate(385,170)">
  <rect x="0" y="0" width="250" height="250" fill="#fff" stroke="#111827" stroke-width="3"/>
  <rect x="0" y="145" width="105" height="105" fill="#fff" stroke="#111827"/><text x="35" y="205" class="t h">a²</text>
  <rect x="105" y="0" width="145" height="145" fill="#fff" stroke="#111827"/><text x="155" y="78" class="t h">b²</text>
  <polygon points="0,0 105,0 0,145" fill="#96cdfc" stroke="#111827"/>
  <polygon points="105,145 250,145 250,250" fill="#aee071" stroke="#111827"/>
  <polygon points="0,250 105,145 105,250" fill="#4ba3f1" stroke="#111827"/>
</g>
<text x="350" y="500" text-anchor="middle" class="t m">The same four right triangles can surround either a central square c² or the two squares a² and b².</text>

    </svg>