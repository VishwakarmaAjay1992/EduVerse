<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="65" text-anchor="middle" class="t h">Viviani’s Theorem</text>
<text x="350" y="104" text-anchor="middle" class="t s">In an equilateral triangle, d₁ + d₂ + d₃ = altitude</text>
<g transform="translate(100,170)">
  <polygon points="250,0 500,430 0,430" fill="#fff" stroke="#111827" stroke-width="4"/>
  <circle cx="250" cy="250" r="7" fill="#111827"/>
  <line x1="250" y1="250" x2="180" y2="370" stroke="#111827" stroke-width="3"/>
  <line x1="250" y1="250" x2="330" y2="390" stroke="#111827" stroke-width="3"/>
  <line x1="250" y1="250" x2="250" y2="430" stroke="#111827" stroke-width="3"/>
  <rect x="173" y="360" width="12" height="12" fill="#fff" stroke="#111827"/>
  <rect x="324" y="380" width="12" height="12" fill="#fff" stroke="#111827"/>
  <rect x="244" y="418" width="12" height="12" fill="#fff" stroke="#111827"/>
  <polygon points="250,250 250,430 0,430" fill="#fde68a" opacity="0.6"/>
  <polygon points="250,250 500,430 250,430" fill="#bfdbfe" opacity="0.6"/>
  <polygon points="250,250 250,0 500,430" fill="#d9f99d" opacity="0.6"/>
  <line x1="250" y1="0" x2="250" y2="430" stroke="#6b7280" stroke-dasharray="8 6" stroke-width="2"/>
  <text x="265" y="340" class="t m">d₁</text><text x="225" y="365" class="t m">d₂</text><text x="305" y="340" class="t m">d₃</text><text x="265" y="165" class="t m">h</text>
</g>
<text x="350" y="920" text-anchor="middle" class="t m">The three small perpendicular distances can be rearranged to match the full altitude.</text>

    </svg>