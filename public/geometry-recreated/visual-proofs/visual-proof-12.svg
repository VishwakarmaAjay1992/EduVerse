<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="70" text-anchor="middle" class="t h">Proof without Words: The Law of Cosines</text>
<text x="350" y="108" text-anchor="middle" class="t s">c² = a² + b² − 2ab cosθ</text>
<g transform="translate(80,180)">
  <ellipse cx="270" cy="220" rx="250" ry="160" fill="#fff" stroke="#111827" stroke-width="3"/>
  <line x1="40" y1="220" x2="500" y2="220" stroke="#111827" stroke-width="3"/>
  <line x1="40" y1="220" x2="180" y2="95" stroke="#111827" stroke-width="3"/>
  <line x1="500" y1="220" x2="180" y2="95" stroke="#111827" stroke-width="3"/>
  <line x1="500" y1="220" x2="260" y2="150" stroke="#111827" stroke-width="3"/>
  <line x1="260" y1="150" x2="380" y2="350" stroke="#111827" stroke-width="3"/>
  <text x="260" y="212" class="t m">a</text><text x="370" y="212" class="t m">a</text><text x="420" y="205" class="t m">b</text><text x="286" y="200" class="t m">c</text>
  <text x="430" y="245" class="t m">θ</text>
  <text x="283" y="144" class="t sm">2a cosθ − b</text>
  <text x="321" y="271" class="t sm">a − c</text>
</g>
<text x="350" y="760" text-anchor="middle" class="t m">The labelled segments form equal products that simplify directly to the law of cosines.</text>

    </svg>