<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="68" text-anchor="middle" class="t h">Tangent Addition Formula</text>
<text x="350" y="108" text-anchor="middle" class="t s">tan(x+y) = (tan x + tan y)/(1 − tan x tan y)</text>
<g transform="translate(95,170)">
  <rect x="0" y="0" width="500" height="500" fill="#fff" stroke="#111827" stroke-width="3"/>
  <polygon points="0,500 235,65 420,270" fill="#fff" stroke="#111827" stroke-width="3"/>
  <line x1="420" y1="270" x2="250" y2="500" stroke="#111827" stroke-width="3"/>
  <text x="210" y="52" class="t sm">1 − tanx tany</text><text x="337" y="52" class="t sm">tanx tany</text><text x="15" y="250" class="t sm">tanx + tany</text>
  <text x="430" y="215" class="t sm">tany</text><text x="430" y="360" class="t sm">tanx</text><text x="210" y="528" class="t sm">1</text>
  <text x="155" y="312" class="t sm">sec(x)</text><text x="305" y="215" class="t sm">tany sec(x)</text>
  <text x="40" y="456" class="t sm">y</text><text x="72" y="438" class="t sm">x</text><text x="242" y="88" class="t sm">x+y</text><text x="415" y="300" class="t sm">x</text>
</g>

    </svg>