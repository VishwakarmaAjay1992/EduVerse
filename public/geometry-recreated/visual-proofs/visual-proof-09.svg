<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="68" text-anchor="middle" class="t h">A Visual Proof of the Sum of Cubes</text>
<text x="350" y="108" text-anchor="middle" class="t s">(1 + 2 + 3 + ··· + n)² = 1³ + 2³ + 3³ + ··· + n³</text>
<g transform="translate(110,160)">
  <rect x="0" y="150" width="360" height="240" rx="16" fill="#f5d5ff" stroke="#c084fc" stroke-width="3"/>
  <rect x="0" y="150" width="180" height="120" fill="#8fd3ff" stroke="#60a5fa"/><rect x="0" y="270" width="108" height="72" fill="#c4f0a0" stroke="#84cc16"/><rect x="0" y="342" width="36" height="24" fill="#fca5a5" stroke="#f87171"/>
  <text x="180" y="420" text-anchor="middle" class="t m">A square built from stacked cube layers</text>
</g>
<g transform="translate(500,170)">
  <g transform="translate(0,140)"><rect x="0" y="0" width="28" height="28" fill="#fca5a5" stroke="#111827"/><text x="5" y="50" class="t sm">1³</text></g>
  <g transform="translate(0,85)"><rect x="0" y="0" width="54" height="54" fill="#c4f0a0" stroke="#111827"/><text x="6" y="76" class="t sm">2³</text></g>
  <g transform="translate(0,5)"><rect x="0" y="0" width="82" height="82" fill="#8fd3ff" stroke="#111827"/><text x="8" y="106" class="t sm">3³</text></g>
  <g transform="translate(110,-35)"><rect x="0" y="0" width="115" height="115" fill="#f5d5ff" stroke="#111827"/><text x="8" y="138" class="t sm">4³</text></g>
</g>

    </svg>