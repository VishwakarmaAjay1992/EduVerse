<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="68" text-anchor="middle" class="t h">Unit-Quarter-Circle Proof</text>
<text x="350" y="108" text-anchor="middle" class="t s">sin²θ + cos²θ = 1</text>
<g transform="translate(95,170)">
  <line x1="60" y1="460" x2="560" y2="460" stroke="#111827" stroke-width="3"/>
  <line x1="60" y1="460" x2="60" y2="60" stroke="#111827" stroke-width="3"/>
  <path d="M60 460 A400 400 0 0 1 460 60" fill="none" stroke="#6b7280" stroke-width="3"/>
  <line x1="60" y1="460" x2="285" y2="235" stroke="#ef4444" stroke-width="5"/>
  <line x1="285" y1="235" x2="285" y2="460" stroke="#ef4444" stroke-width="5"/>
  <line x1="60" y1="460" x2="285" y2="460" stroke="#ef4444" stroke-width="5"/>
  <line x1="285" y1="235" x2="460" y2="60" stroke="#111827" stroke-width="3"/>
  <text x="150" y="438" class="t s">cosθ</text><text x="295" y="360" class="t s">sinθ</text><text x="175" y="330" class="t s">1</text><text x="82" y="452" class="t s">θ</text>
</g>

    </svg>