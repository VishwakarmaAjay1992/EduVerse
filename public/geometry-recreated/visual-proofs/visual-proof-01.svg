<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="70" text-anchor="middle" class="t h">Visual Proof</text>
<text x="350" y="112" text-anchor="middle" class="t s">(a + b + c)² = a² + b² + c² + 2ab + 2ac + 2bc</text>
<g transform="translate(95,170)">
  <rect x="0" y="0" width="500" height="500" fill="#fff" stroke="#111827" stroke-width="4"/>
  <rect x="0" y="0" width="260" height="260" fill="#f6db5b" stroke="#111827" stroke-width="2"/>
  <rect x="260" y="0" width="140" height="260" fill="#f69ca4" stroke="#111827" stroke-width="2"/>
  <rect x="400" y="0" width="100" height="260" fill="#8ecf1f" stroke="#111827" stroke-width="2"/>
  <rect x="0" y="260" width="260" height="140" fill="#f69ca4" stroke="#111827" stroke-width="2"/>
  <rect x="260" y="260" width="140" height="140" fill="#f5ef64" stroke="#111827" stroke-width="2"/>
  <rect x="400" y="260" width="100" height="140" fill="#1fb5ed" stroke="#111827" stroke-width="2"/>
  <rect x="0" y="400" width="260" height="100" fill="#8ecf1f" stroke="#111827" stroke-width="2"/>
  <rect x="260" y="400" width="140" height="100" fill="#1fb5ed" stroke="#111827" stroke-width="2"/>
  <rect x="400" y="400" width="100" height="100" fill="#fff9d7" stroke="#111827" stroke-width="2"/>
  <text x="120" y="145" class="t s">a²</text><text x="310" y="145" class="t s">ab</text><text x="435" y="145" class="t s">ac</text>
  <text x="115" y="335" class="t s">ab</text><text x="310" y="335" class="t s">b²</text><text x="435" y="335" class="t s">bc</text>
  <text x="115" y="455" class="t s">ac</text><text x="310" y="455" class="t s">bc</text><text x="435" y="455" class="t s">c²</text>
  <text x="120" y="-18" class="t m">a</text><text x="315" y="-18" class="t m">b</text><text x="435" y="-18" class="t m">c</text>
  <text x="-28" y="130" class="t m">a</text><text x="-28" y="330" class="t m">b</text><text x="-28" y="455" class="t m">c</text>
  <text x="175" y="-52" class="t m">a + b + c</text><text x="-54" y="250" transform="rotate(-90 -54,250)" class="t m">a + b + c</text>
</g>
<text x="350" y="760" text-anchor="middle" class="t m">A large square of side a + b + c is partitioned into three squares and six rectangles.</text>
<text x="350" y="792" text-anchor="middle" class="t m">Adding their areas gives the expansion of (a + b + c)².</text>

    </svg>