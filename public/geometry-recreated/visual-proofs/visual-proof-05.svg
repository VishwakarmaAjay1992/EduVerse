<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="68" text-anchor="middle" class="t h">Difference of Squares and Cubes</text>
<g transform="translate(60,120)">
  <rect x="0" y="0" width="260" height="260" rx="18" fill="#fff" stroke="#cbd5e1"/>
  <text x="130" y="34" text-anchor="middle" class="t s">a² − b² = (a − b)(a + b)</text>
  <rect x="25" y="70" width="110" height="110" fill="#e5e7eb" stroke="#94a3b8"/><rect x="165" y="110" width="55" height="55" fill="#e5e7eb" stroke="#94a3b8"/>
  <rect x="25" y="210" width="110" height="20" fill="#d8b4fe" stroke="#111827"/><rect x="25" y="70" width="165" height="55" fill="#d8b4fe" stroke="#111827"/>
  <rect x="190" y="70" width="30" height="95" fill="#93c5fd" stroke="#111827"/>
  <text x="95" y="100" class="t m">a</text><text x="180" y="140" class="t m">b</text>
  <text x="105" y="245" class="t sm">(a−b)</text><text x="120" y="140" class="t sm">a+b</text>
</g>
<g transform="translate(360,120)">
  <rect x="0" y="0" width="280" height="420" rx="18" fill="#fff" stroke="#cbd5e1"/>
  <text x="140" y="34" text-anchor="middle" class="t s">a³ − b³ = (a − b)(a² + ab + b²)</text>
  <g transform="translate(35,80)">
    <rect x="0" y="0" width="120" height="120" fill="#f2d0ff" stroke="#111827"/>
    <polygon points="120,0 165,-24 165,96 120,120" fill="#dd9fff" stroke="#111827"/>
    <polygon points="0,0 45,-24 165,-24 120,0" fill="#f6ddff" stroke="#111827"/>
    <text x="50" y="65" class="t s">a³</text>
    <g transform="translate(170,80) scale(0.55)"><rect x="0" y="0" width="120" height="120" fill="#dbeafe" stroke="#111827"/><polygon points="120,0 165,-24 165,96 120,120" fill="#bfdbfe" stroke="#111827"/><polygon points="0,0 45,-24 165,-24 120,0" fill="#eff6ff" stroke="#111827"/></g>
  </g>
  <g transform="translate(60,270)">
    <rect x="0" y="0" width="80" height="80" fill="#f7c59f" stroke="#111827"/><text x="15" y="44" class="t sm">(a−b)a²</text>
    <rect x="90" y="0" width="80" height="80" fill="#d8b4fe" stroke="#111827"/><text x="105" y="44" class="t sm">(a−b)ab</text>
    <rect x="180" y="0" width="60" height="80" fill="#93c5fd" stroke="#111827"/><text x="188" y="44" class="t sm">(a−b)b²</text>
  </g>
</g>
<text x="350" y="920" text-anchor="middle" class="t m">Subtracting smaller shapes from larger ones produces factorised forms.</text>

    </svg>