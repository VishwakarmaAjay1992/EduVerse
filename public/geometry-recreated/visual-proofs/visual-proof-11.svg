<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
    <defs>
      <style>
        .t{font-family:Arial,Helvetica,sans-serif; fill:#17324d}
        .h{font-size:34px; font-weight:700}
        .s{font-size:22px; font-weight:700}
        .m{font-size:20px;}
        .sm{font-size:16px; fill:#4b5563}
        .box{fill:#fff;stroke:#d1d5db;stroke-width:2}
        .thin{stroke:#374151;stroke-width:2;fill:none}
        .axis{stroke:#6b7280;stroke-width:2;fill:none;marker-end:url(#arr)}
      </style>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
      </marker>
    </defs>
    <rect x="0" y="0" width="700" height="980" fill="#fafaf7"/>
    <rect x="18" y="18" width="664" height="944" rx="24" fill="#fffef7" stroke="#dbe4ea" stroke-width="3"/>
    
<text x="350" y="68" text-anchor="middle" class="t h">Geometric Proof of cos(α + β)</text>
<text x="350" y="108" text-anchor="middle" class="t s">cos(α + β) = cosα cosβ − sinα sinβ</text>
<g transform="translate(95,180)">
  <rect x="0" y="0" width="510" height="510" fill="#fff" stroke="#111827" stroke-width="4"/>
  <polygon points="50,450 320,95 465,330" fill="#f4c1d5" stroke="#111827" stroke-width="3"/>
  <polygon points="50,450 320,450 465,330" fill="#c9def4" stroke="#111827" stroke-width="2" opacity="0.7"/>
  <text x="250" y="95" class="t m">cos(α + β)</text>
  <text x="390" y="85" class="t m">sinα sinβ</text>
  <text x="520" y="220" transform="rotate(90 520,220)" class="t m">cosα sinβ</text>
  <text x="520" y="390" transform="rotate(90 520,390)" class="t m">cosα cosβ</text>
  <text x="190" y="480" class="t m">cosα cosβ</text>
  <text x="390" y="480" class="t m">sinα cosβ</text>
  <text x="240" y="195" class="t m">α + β</text>
  <text x="322" y="286" class="t m">sinβ</text>
  <text x="200" y="370" class="t m">1</text>
  <text x="82" y="420" class="t m">β</text><text x="430" y="355" class="t m">α</text>
</g>

    </svg>