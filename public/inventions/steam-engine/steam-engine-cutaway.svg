<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">Simplified cutaway of a condensing reciprocating steam engine</title>
<desc id="desc">A boiler and firebox at left send steam through a red pipe and valve to a cylinder. A piston drives a connecting rod, crank and flywheel. Blue exhaust flows to a condenser and water returns toward the boiler.</desc>
<defs><marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker><marker id="arrowB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker><style>.l{font:600 22px system-ui,sans-serif;fill:#111827}.s{font:18px system-ui,sans-serif;fill:#374151}.box{fill:#fff;stroke:#374151;stroke-width:5}.metal{fill:#d1d5db;stroke:#374151;stroke-width:5}.hot{fill:none;stroke:#dc2626;stroke-width:12;marker-end:url(#arrowR)}.cold{fill:none;stroke:#2563eb;stroke-width:10;marker-end:url(#arrowB)}</style></defs>
<rect width="1200" height="720" rx="28" fill="#f8fafc"/>
<rect x="55" y="165" width="290" height="310" rx="38" class="metal"/><rect x="95" y="395" width="205" height="90" rx="18" fill="#7c2d12" stroke="#374151" stroke-width="5"/><path d="M120 430c35-70 65 40 92-30 28 74 51-20 72 30" fill="none" stroke="#fb923c" stroke-width="18"/><path d="M85 285h230" stroke="#2563eb" stroke-width="5" stroke-dasharray="10 8"/><text x="115" y="145" class="l">Boiler</text><text x="112" y="525" class="l">Firebox / heat</text>
<path d="M345 220H515V150H655" class="hot"/><text x="405" y="195" class="s">steam pipe</text>
<rect x="650" y="100" width="95" height="105" rx="12" class="box"/><path d="M675 125h45M675 180h45" stroke="#111827" stroke-width="8"/><text x="635" y="75" class="l">Valve</text>
<rect x="620" y="220" width="260" height="210" rx="22" class="metal"/><rect x="650" y="285" width="180" height="76" rx="10" fill="#f9fafb" stroke="#111827" stroke-width="7"/><line x1="740" y1="361" x2="740" y2="505" stroke="#111827" stroke-width="14"/><text x="660" y="255" class="l">Cylinder</text><text x="680" y="333" class="l">Piston</text><text x="758" y="460" class="s">piston rod</text>
<line x1="740" y1="505" x2="930" y2="555" stroke="#6b7280" stroke-width="20" stroke-linecap="round"/><circle cx="950" cy="560" r="32" fill="#e5e7eb" stroke="#111827" stroke-width="7"/><circle cx="1000" cy="560" r="108" fill="none" stroke="#4b5563" stroke-width="22"/><line x1="950" y1="560" x2="1000" y2="560" stroke="#111827" stroke-width="12"/><text x="820" y="525" class="l">Connecting rod</text><text x="900" y="690" class="l">Crank &amp; flywheel</text><path d="M1000 420a140 140 0 0 1 130 130" fill="none" stroke="#16a34a" stroke-width="8" marker-end="url(#arrowR)"/>
<path d="M650 390H520V540H430" class="cold"/><text x="505" y="430" class="s">exhaust steam</text><rect x="245" y="520" width="190" height="120" rx="24" fill="#dbeafe" stroke="#374151" stroke-width="5"/><path d="M270 565c25-25 50 25 75 0s50 25 70 0" fill="none" stroke="#2563eb" stroke-width="6"/><text x="260" y="675" class="l">Condenser</text><path d="M245 595H165V475" class="cold"/><text x="52" y="625" class="s">water return</text>
<text x="40" y="55" class="l">Heat → steam flow → piston motion → rotary motion</text><text x="40" y="90" class="s">Original educational illustration; simplified and not to scale.</text>
</svg>
